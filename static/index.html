<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Food Truck Permits</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: system-ui, sans-serif; background: #f5f5f5; color: #222; padding: 2rem; }
    h1 { font-size: 1.5rem; margin-bottom: 1.5rem; }
    h2 { font-size: 1.1rem; margin-bottom: 0.75rem; color: #444; }
    .sections { display: flex; gap: 1.5rem; flex-wrap: wrap; }
    .card { background: white; border-radius: 8px; padding: 1.25rem; flex: 1; min-width: 280px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
    label { display: block; font-size: 0.85rem; color: #555; margin-bottom: 0.25rem; margin-top: 0.75rem; }
    label:first-of-type { margin-top: 0; }
    input, select { width: 100%; padding: 0.45rem 0.6rem; border: 1px solid #ddd; border-radius: 5px; font-size: 0.9rem; }
    button { margin-top: 1rem; width: 100%; padding: 0.5rem; background: #2563eb; color: white; border: none; border-radius: 5px; font-size: 0.9rem; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .results { margin-top: 1rem; font-size: 0.85rem; }
    .result-item { border-top: 1px solid #eee; padding: 0.6rem 0; }
    .result-item:first-child { border-top: none; }
    .result-item strong { display: block; margin-bottom: 0.2rem; }
    .result-item span { color: #666; }
    .badge { display: inline-block; font-size: 0.75rem; padding: 0.15rem 0.5rem; border-radius: 99px; background: #dcfce7; color: #166534; margin-left: 0.4rem; }
    .badge.expired { background: #fee2e2; color: #991b1b; }
    .badge.other { background: #f3f4f6; color: #374151; }
    .error { color: #dc2626; margin-top: 0.5rem; font-size: 0.85rem; }
    .empty { color: #888; margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Food Truck Permits</h1>
  <div class="sections">

    <!-- Search -->
    <div class="card">
      <h2>Search Permits</h2>
      <label>Search by</label>
      <select id="search-type">
        <option value="applicant">Applicant</option>
        <option value="address">Address</option>
      </select>
      <label id="search-label">Applicant name</label>
      <input id="search-value" type="text" placeholder="e.g. Natan's" />
      <label id="status-label">Status (optional, applicant only)</label>
      <select id="search-status">
        <option value="">Any</option>
        <option value="APPROVED">Approved</option>
        <option value="EXPIRED">Expired</option>
        <option value="SUSPEND">Suspended</option>
        <option value="INACTIVE">Inactive</option>
      </select>
      <button onclick="searchPermits()">Search</button>
      <div class="results" id="search-results"></div>
    </div>

    <!-- Nearest -->
    <div class="card">
      <h2>Nearest Permits</h2>
      <label>Latitude</label>
      <input id="lat" type="number" step="any" placeholder="37.7749" />
      <label>Longitude</label>
      <input id="lon" type="number" step="any" placeholder="-122.4194" />
      <label>Status (optional)</label>
      <select id="nearest-status">
        <option value="APPROVED">Approved</option>
        <option value="">Any</option>
        <option value="EXPIRED">Expired</option>
      </select>
      <button onclick="nearestPermits()">Find Nearest</button>
      <div class="results" id="nearest-results"></div>
    </div>

  </div>

  <script>
    document.getElementById('search-type').addEventListener('change', function() {
      const isAddress = this.value === 'address';
      document.getElementById('search-label').textContent = isAddress ? 'Address' : 'Applicant name';
      document.getElementById('search-value').placeholder = isAddress ? 'e.g. Market St' : "e.g. Natan's";
      document.getElementById('status-label').style.opacity = isAddress ? '0.4' : '1';
      document.getElementById('search-status').disabled = isAddress;
    });

    function badgeClass(status) {
      if (!status) return 'other';
      const s = status.toUpperCase();
      if (s === 'APPROVED') return '';
      if (s === 'EXPIRED') return 'expired';
      return 'other';
    }

    function renderPermit(p) {
      return `
        <div class="result-item">
          <strong>${p.applicant || 'Unknown'} <span class="badge ${badgeClass(p.status)}">${p.status || ''}</span></strong>
          <span>${p.address || ''}</span><br/>
          <span style="color:#888">${p.food_items ? p.food_items.slice(0, 80) + (p.food_items.length > 80 ? '…' : '') : ''}</span>
        </div>`;
    }

    async function searchPermits() {
      const type = document.getElementById('search-type').value;
      const value = document.getElementById('search-value').value.trim();
      const status = document.getElementById('search-status').value;
      const out = document.getElementById('search-results');
      if (!value) { out.innerHTML = '<div class="error">Please enter a search value.</div>'; return; }

      const params = new URLSearchParams({ [type]: value });
      if (status && type === 'applicant') params.set('status', status);

      try {
        const res = await fetch(`/permits/search?${params}`);
        if (!res.ok) { const e = await res.json(); out.innerHTML = `<div class="error">${e.detail}</div>`; return; }
        const data = await res.json();
        out.innerHTML = data.length ? data.map(renderPermit).join('') : '<div class="empty">No results found.</div>';
      } catch (e) {
        out.innerHTML = '<div class="error">Request failed.</div>';
      }
    }

    async function nearestPermits() {
      const lat = document.getElementById('lat').value;
      const lon = document.getElementById('lon').value;
      const status = document.getElementById('nearest-status').value;
      const out = document.getElementById('nearest-results');
      if (!lat || !lon) { out.innerHTML = '<div class="error">Please enter lat and lon.</div>'; return; }

      const params = new URLSearchParams({ lat, lon });
      if (status) params.set('status', status);

      try {
        const res = await fetch(`/permits/nearest?${params}`);
        if (!res.ok) { const e = await res.json(); out.innerHTML = `<div class="error">${e.detail}</div>`; return; }
        const data = await res.json();
        out.innerHTML = data.length
          ? data.map(p => `
            <div class="result-item">
              <strong>${p.applicant || 'Unknown'} <span class="badge ${badgeClass(p.status)}">${p.status || ''}</span></strong>
              <span>${p.address || ''}</span><br/>
              <span style="color:#888">${Math.round(p.distance_meters)}m away</span>
            </div>`).join('')
          : '<div class="empty">No results found.</div>';
      } catch (e) {
        out.innerHTML = '<div class="error">Request failed.</div>';
      }
    }
  </script>
</body>
</html>
